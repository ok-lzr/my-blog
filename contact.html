<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>联系 · 个人网站</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%236b6bff'>💬</text></svg>">
    <link rel="stylesheet" href="./styles/style.css">
    <!-- 移除 Google Fonts 链接 -->
    <style>
        .contact-container {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }
        
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .contact-header h1 {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 800;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(26, 115, 232, 0.2));
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }
        
        .contact-header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
        
        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .contact-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        
        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-accent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .contact-card:hover::before {
            opacity: 1;
        }
        
        .contact-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-color);
            box-shadow: var(--shadow-xl);
        }
        
        .contact-emoji {
            font-size: 2.5rem;
            min-width: 60px;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .contact-card:hover .contact-emoji {
            transform: scale(1.2) rotate(10deg);
            animation: float 2s ease-in-out infinite;
        }
        
        .contact-info {
            flex: 1;
        }
        
        .contact-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .contact-info p {
            color: var(--text-secondary);
            font-size: 1rem;
            word-break: break-word;
            line-height: 1.6;
        }
        
        .contact-arrow {
            color: var(--accent-color);
            font-size: 1.8rem;
            opacity: 0.8;
            transition: opacity 0.2s, transform 0.3s ease;
        }
        
        .contact-card:hover .contact-arrow {
            opacity: 1;
            transform: translateX(6px);
            color: var(--accent-color);
        }
        
        .contact-form {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 3rem;
            margin-top: 2.5rem;
            box-shadow: var(--shadow-lg);
            transition: var(--transition-smooth);
        }
        
        .contact-form:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-4px);
        }
        
        .form-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-primary);
            text-align: center;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 1.8rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(26, 115, 232, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }
        
        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
            background: rgba(26, 115, 232, 0.08);
        }
        
        .form-textarea {
            min-height: 140px;
            resize: vertical;
        }
        
        .form-button {
            background: var(--gradient-accent);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            width: 100%;
            font-family: 'Inter', sans-serif;
            box-shadow: var(--shadow-md);
        }
        
        .form-button:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        .form-note {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .contact-card {
                padding: 1.5rem;
                gap: 1.2rem;
            }
            
            .contact-emoji {
                font-size: 2.2rem;
                min-width: 50px;
            }
            
            .contact-form {
                padding: 2.5rem 2rem;
            }
        }
        
        @media (max-width: 600px) {
            .contact-card {
                padding: 1.2rem;
                gap: 1rem;
            }
            
            .contact-emoji {
                font-size: 1.8rem;
                min-width: 40px;
            }
            
            .contact-form {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }
            
            .form-input,
            .form-textarea {
                padding: 1rem 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-area">
                <a href="index.html" class="avatar-link">
                    <img src="assets/avatar.png" alt="我的头像" class="avatar-img">
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html" data-nav="home">首页</a>
                <a href="articles.html" data-nav="articles">文章</a>
                <a href="project.html" data-nav="projects">项目</a>
                <a href="about.html" data-nav="about">关于</a>
                <a href="contact.html" data-nav="contact" class="active">联系</a>
            </div>
            <div class="nav-actions"></div>
        </nav>
    </header>

    <main class="main-content" style="padding-top: 3rem; align-items: flex-start;">
        <div class="contact-container">
            <div class="contact-header">
                <h1>联系</h1>
                <p>期待听到你的声音</p>
            </div>
            
            <div class="contact-methods">
                <a href="mailto:3866477796@qq.com" class="contact-card">
                    <span class="contact-emoji">📧</span>
                    <div class="contact-info">
                        <h3>Email</h3>
                        <p>邮箱1：3866477796@qq.com 邮箱2：csgdnrxg@163.com</p>
                    </div>
                    <span class="contact-arrow">→</span>
                </a>
                
                <a href="https://github.com/ok-lzr" target="_blank" class="contact-card">
                    <span class="contact-emoji">🐙</span>
                    <div class="contact-info">
                        <h3>GitHub</h3>
                        <p>ok-lzr</p>
                    </div>
                    <span class="contact-arrow">→</span>
                </a>
                
                <a href="#" class="contact-card">
                    <span class="contact-emoji">📱</span>
                    <div class="contact-info">
                        <h3>QQ</h3>
                        <p>QQ号 (点击复制)</p>
                    </div>
                    <span class="contact-arrow">→</span>
                </a>
            </div>
            
            <div class="contact-form">
                <div class="form-title">发送留言</div>
                <form id="contactForm" onsubmit="return false;">
                    <div class="form-group">
                        <label class="form-label" for="name">姓名</label>
                        <input type="text" class="form-input" id="name" placeholder="你的名字">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">邮箱</label>
                        <input type="email" class="form-input" id="email" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="message">留言</label>
                        <textarea class="form-textarea" id="message" placeholder="想说什么..."></textarea>
                    </div>
                    <button type="submit" class="form-button" onclick="alert('哈哈，骗你的（￣︶￣）实际上根本发不出去，你可以通过上方的信息联系我')">发送留言</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>✦ 个人网站 · <span id="year"></span></span>
    </footer>

    <script src="script.js"></script>
    <script>
        document.querySelectorAll('.contact-card')[2].addEventListener('click', function(e) {
            e.preventDefault();
            navigator.clipboard.writeText('3866477796').then(() => {
                alert('QQ号已复制到剪贴板');
            }).catch(() => {
                alert('QQ号: 3866477796');
            });
        });
    </script>
</body>
</html>
