<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>关于 · 个人网站</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%236b6bff'>👤</text></svg>">
    <link rel="stylesheet" href="./styles/style.css">
    <style>
        .about-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 850px;
            margin: 0 auto;
            text-align: left;
            position: relative;
            z-index: 1;
        }
        
        .about-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }
        
        .about-header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.8rem;
            filter: drop-shadow(0 0 20px rgba(26, 115, 232, 0.2));
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }
        
        .about-content {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 36px;
            padding: 3rem;
            width: 100%;
            box-shadow: var(--shadow-lg);
            transition: var(--transition-smooth);
        }
        
        .about-content:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-4px);
        }
        
        .about-section {
            margin-bottom: 2.5rem;
        }
        
        .about-section:last-child {
            margin-bottom: 0;
        }
        
        .about-section h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        
        .about-section p {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-top: 1rem;
        }
        
        .skill-tag {
            background: rgba(26, 115, 232, 0.1);
            border: 1px solid rgba(26, 115, 232, 0.2);
            border-radius: 24px;
            padding: 0.5rem 1.4rem;
            font-size: 0.9rem;
            color: var(--accent-color);
            transition: var(--transition-smooth);
            font-weight: 600;
            cursor: default;
        }
        
        .skill-tag:hover {
            background: rgba(26, 115, 232, 0.2);
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        
        .timeline {
            position: relative;
            padding-left: 2rem;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--gradient-accent);
            opacity: 0.3;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 2rem;
            padding-left: 1.5rem;
            transition: var(--transition-smooth);
        }
        
        .timeline-item:hover {
            transform: translateX(5px);
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 0.5rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 15px rgba(26, 115, 232, 0.4);
            transition: var(--transition-smooth);
        }
        
        .timeline-item:hover::before {
            transform: scale(1.2);
            background: var(--gradient-accent);
        }
        
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        
        .timeline-year {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .timeline-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .timeline-content p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.7;
        }
        
        @media (max-width: 768px) {
            .about-content {
                padding: 2.5rem 2rem;
                border-radius: 28px;
            }
            
            .about-header h1 {
                font-size: clamp(2rem, 5vw, 3rem);
            }
        }
        
        @media (max-width: 600px) {
            .about-content {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }
            
            .timeline-item {
                padding-left: 1rem;
            }
            
            .timeline-item::before {
                left: -1.5rem;
                width: 10px;
                height: 10px;
            }
            
            .timeline::before {
                left: -0.5rem;
            }
            
            .skill-tag {
                padding: 0.4rem 1.2rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-area">
                <a href="index.html" class="avatar-link">
                    <img src="assets/avatar.png" alt="我的头像" class="avatar-img">
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html" data-nav="home">首页</a>
                <a href="articles.html" data-nav="articles">文章</a>
                <a href="project.html" data-nav="projects">项目</a>
                <a href="about.html" data-nav="about" class="active">关于</a>
                <a href="contact.html" data-nav="contact">联系</a>
            </div>
            <div class="nav-actions"></div>
        </nav>
    </header>

    <main class="main-content" style="padding-top: 3rem; align-items: flex-start;">
        <div class="about-container">
            <div class="about-header">
                <h1>关于我</h1>
            </div>
            
            <div class="about-content">
                <div class="about-section">
                    <h2>👋 你好，我是...</h2>
                    <p>一名热爱创造的设计师和开发者，相信好的设计应该简洁、有用、令人愉悦。这个网站是我记录想法和作品的地方。</p>
                </div>
                
                <div class="about-section">
                    <h2>🛠️ 常用工具</h2>
                    <div class="skill-tags">
                        <span class="skill-tag">HTML</span>
                        <span class="skill-tag">CSS</span>
                        <span class="skill-tag">JavaScript</span>
                        <span class="skill-tag">Git</span>
                        <span class="skill-tag">Python</span>
                        <span class="skill-tag">C++</span>
                    </div>
                </div>
                
                <div class="about-section">
                    <h2>🎯 兴趣</h2>
                    <p>除了写代码，还喜欢画画、读书、骑自行车。相信保持好奇心是最好的成长方式。</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>✦ 个人网站 · <span id="year"></span></span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
