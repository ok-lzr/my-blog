<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakCoach · 智能演讲助手</title>
    
    <!-- 本地 Inter 字体 -->
    <link rel="preload" href="../../assets/inter.ttf" as="font" type="font/ttf" crossorigin>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('inter.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
    </style>
    
    <!-- Favicon 图标 - 使用 🔈 表情符号的 SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234b7bec'%3E%3Cpath d='M3 9v6h4l5 5V4L7 9H3z'/%3E%3Cpath d='M16 7c0-1.5-.8-2.8-2-3.4v2.1c.6.4 1 1.1 1 1.9s-.4 1.5-1 1.9v2.1c1.2-.6 2-1.9 2-3.4z'/%3E%3Cpath d='M19 7c0-2.6-1.5-4.8-3.6-6v2.1c1.4.9 2.4 2.5 2.4 4.3 0 1.8-1 3.4-2.4 4.3v2.1c2.1-1.2 3.6-3.4 3.6-6z'/%3E%3C/svg%3E">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link rel="stylesheet" href="style.css">
    <!-- ECharts 用于可视化 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 左侧主面板 -->
        <main class="main-panel">
            <div class="header">
                <div class="header-left">
                    <h1>SpeakCoach</h1>
                    <button class="theme-button" id="theme-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <circle cx="12" cy="12" r="5" fill="currentColor"/>
                            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button>
                </div>
                <span class="badge">实时演讲分析</span>
            </div>
            
            <!-- 转录区域 -->
            <div class="transcript-container">
                <div class="transcript-header">
                    <span class="label">实时转录</span>
                    <span class="interim-label" id="interim-indicator">正在聆听...</span>
                </div>
                <div class="transcript-box" id="transcript-box">
                    <div class="placeholder" id="placeholder-text">
                        点击下方按钮开始演讲，我会实时记录你的每一句话
                    </div>
                </div>
            </div>

            <!-- 实时指标卡片 -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">当前语速</div>
                    <div class="metric-value" id="speed-value">0</div>
                    <div class="metric-unit">字/分钟</div>
                    <div class="progress-bar" id="speed-progress">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">平均语速</div>
                    <div class="metric-value" id="avg-speed-value">0</div>
                    <div class="metric-unit">字/分钟</div>
                    <div class="metric-note">整体节奏</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">语气词</div>
                    <div class="metric-value" id="filler-count">0</div>
                    <div class="metric-unit">次</div>
                    <div class="filler-breakdown" id="filler-breakdown">
                        <span>暂无语气词</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">当前时长</div>
                    <div class="metric-value" id="duration-value">00:00</div>
                    <div class="metric-unit">分钟:秒</div>
                </div>
            </div>

            <!-- 控制按钮组 -->
            <div class="controls">
                <button class="btn btn-primary" id="start-btn">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
                        <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.2"/>
                        <circle cx="12" cy="12" r="6" fill="currentColor"/>
                    </svg>
                    开始练习
                </button>
                <button class="btn btn-secondary" id="pause-btn" disabled>
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
                        <rect x="7" y="6" width="3" height="12" fill="currentColor"/>
                        <rect x="14" y="6" width="3" height="12" fill="currentColor"/>
                    </svg>
                    暂停
                </button>
            </div>

            <!-- 状态提示 -->
            <div class="status-bar">
                <div class="status-left">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">就绪</span>
                </div>
            </div>
        </main>

        <!-- 右侧分析面板 -->
        <aside class="analysis-panel">
            <h3>实时分析</h3>
            
            <!-- 语速趋势图 -->
            <div class="chart-container">
                <div class="chart-header">
                    <span class="chart-title">语速趋势</span>
                    <span class="chart-unit">字/分钟 (每5秒)</span>
                </div>
                <div id="speed-chart" style="width: 100%; height: 160px;"></div>
            </div>

            <!-- 语气词分布仪表盘 -->
            <div class="chart-container">
                <div class="chart-header">
                    <span class="chart-title">语气词分布</span>
                    <span class="chart-unit">占比</span>
                </div>
                <div id="filler-chart" style="width: 100%; height: 140px;"></div>
            </div>

            <!-- 实时建议 -->
            <div class="suggestions">
                <div class="suggestions-header">
                    <span class="suggestions-title">实时建议</span>
                </div>
                <div class="suggestions-content" id="suggestions">
                    <div class="suggestion-item neutral">👋 点击开始按钮，我会给你反馈</div>
                </div>
            </div>

            <!-- 隐私提示 -->
            <div class="privacy-note">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                所有处理均在本地进行，保护你的隐私
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
